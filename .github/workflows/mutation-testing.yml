name: mutation testing

on:
  pull_request:
    branches:
      - main

jobs:
  mutation-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Detect package manager
        id: pkg-manager
        run: |
          pm=$(node -p "require('./package.json').packageManager || ''")
          echo "value=$pm" >> "$GITHUB_OUTPUT"
          if [[ "$pm" == bun@* ]]; then
            echo "bun_version=${pm#bun@}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache dependencies
        id: cache-dependencies
        if: ${{ !startsWith(steps.pkg-manager.outputs.value, 'bun') }}
        uses: actions/cache@v4.2.3
        with:
          path: node_modules
          key: ${{ runner.os }}-dependencies-${{ hashFiles('**/pnpm-lock.yaml', 'bun.lock*', 'package-lock.json', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-dependencies-

      - name: Install Bun
        if: ${{ startsWith(steps.pkg-manager.outputs.value, 'bun') }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.pkg-manager.outputs.bun_version || 'latest' }}

      - name: Install dependencies
        env:
          CI: 1
        run: make install

      - name: Start container
        env:
          CI: 0
        run: make start

      - name: Run mutation testing
        env:
          CI: 0
        run: make test-mutation
