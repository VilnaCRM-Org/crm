name: performance testing

on:
  pull_request:
    branches:
      - main

jobs:
  performance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Detect package manager
        id: pkg-manager
        run: |
          pm=$(node -p "require('./package.json').packageManager || ''")
          echo "value=$pm" >> "$GITHUB_OUTPUT"
          if [[ "$pm" == bun@* ]]; then
            echo "bun_version=${pm#bun@}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache dependencies
        id: cache-dependencies
        if: ${{ !startsWith(steps.pkg-manager.outputs.value, 'bun') }}
        uses: actions/cache@v4.2.3
        with:
          path: node_modules
          key: ${{ runner.os }}-dependencies-${{ hashFiles('**/pnpm-lock.yaml', 'bun.lock*', 'package-lock.json', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-dependencies-

      - name: Install dependencies
        env:
          CI: 1
        run: make install

      - name: Start container
        env:
          CI: 0
        run: make start

      - name: Install Chromium in dev container
        env:
          CI: 0
        run: docker compose exec -T dev apk add --no-cache chromium nss freetype ttf-freefont harfbuzz

      - name: Run desktop performance test
        env:
          CI: 0
          LHCI_CHROME_FLAGS: --no-sandbox --disable-dev-shm-usage --disable-gpu --headless=new --ignore-certificate-errors
          LHCI_TARGET_URL: http://prod:3001
          REACT_APP_PROD_HOST_API_URL: http://prod:3001
          WEBSITE_DOMAIN: prod
        run: make lighthouse-desktop

      - name: Run mobile performance test
        env:
          CI: 0
          LHCI_CHROME_FLAGS: --no-sandbox --disable-dev-shm-usage --disable-gpu --headless=new --ignore-certificate-errors
          LHCI_TARGET_URL: http://prod:3001
          REACT_APP_PROD_HOST_API_URL: http://prod:3001
          WEBSITE_DOMAIN: prod
        run: make lighthouse-mobile
