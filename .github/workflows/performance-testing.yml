name: performance testing

on:
  pull_request:
    branches:
      - main

jobs:
  performance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Start container
        run: make start

      - name: Install Chromium in dev container for Lighthouse
        run: |
          docker compose exec -T dev apk add --no-cache \
            chromium \
            font-freefont \
            freetype \
            harfbuzz \
            nss

      - name: Run desktop performance test
        run: make lighthouse-desktop

      - name: Run mobile performance test
        run: make lighthouse-mobile
