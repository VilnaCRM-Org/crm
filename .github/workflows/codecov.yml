name: codecov

on:
  pull_request:
    branches:
      - main

jobs:
  codecov:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Detect package manager
        id: pkg-manager
        run: |
          pm=$(node -p "require('./package.json').packageManager || ''")
          echo "value=$pm" >> "$GITHUB_OUTPUT"
          if [[ "$pm" == bun@* ]]; then
            echo "bun_version=${pm#bun@}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache dependencies
        id: cache-dependencies
        uses: actions/cache@v4.2.3
        with:
          path: node_modules
          key: ${{ runner.os }}-dependencies-node-${{ vars.NODE_VERSION }}-${{ hashFiles('**/pnpm-lock.yaml', 'bun.lock*', 'package-lock.json', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-dependencies-node-${{ vars.NODE_VERSION }}-

      - name: Install Bun
        if: ${{ startsWith(steps.pkg-manager.outputs.value, 'bun') }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        env:
          CI: 1
        run: make install

      - name: Start container
        env:
          CI: 0
        run: make start

      - name: Run unit tests
        env:
          CI: 0
        run: make test-unit-all

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
