name: security testing

on:
  pull_request:
    branches: ['main']

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect package manager
        id: pkg-manager
        run: |
          pm=$(node -p "require('./package.json').packageManager || ''")
          echo "value=$pm" >> "$GITHUB_OUTPUT"
          if [[ "$pm" == bun@* ]]; then
            echo "bun_version=${pm#bun@}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Bun
        if: ${{ startsWith(steps.pkg-manager.outputs.value, 'bun') }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.pkg-manager.outputs.bun_version || 'latest' }}

      - name: Install dependencies (host)
        env:
          CI: 1
        run: make install

      - name: Cache CodeQL databases
        uses: actions/cache@v4.2.3
        with:
          path: ${{ runner.workspace }}/codeql_databases
          key: ${{ runner.os }}-codeql-${{ hashFiles('**/pnpm-lock.yaml', 'bun.lock*', 'package-lock.json', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-codeql-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: '/language:${{matrix.language}}'
