name: sandbox

on:
  pull_request:
    types: [opened, reopened, synchronize]

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PROD_AWS_ACCOUNT_ID: ${{ vars.PROD_AWS_ACCOUNT_ID }}
  SANDBOX_CREATION_TRIGGER_ROLE: sandbox-crm-creation-trigger-role

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Validate environment variables
        run: |
          if [ -z "${AWS_REGION}" ]; then
            echo "::error::AWS_REGION is not set"
            exit 1
          fi
          if [ -z "${PROD_AWS_ACCOUNT_ID}" ]; then
            echo "::error::PROD_AWS_ACCOUNT_ID is not set"
            exit 1
          fi
          if [ -z "${BRANCH_NAME}" ]; then
            echo "::error::BRANCH_NAME is not set"
            exit 1
          fi
          if [ -z "${PR_NUMBER}" ] || [ "${PR_NUMBER}" = "null" ]; then
            echo "::error::PR_NUMBER is not set"
            exit 1
          fi

      - name: Build Sandbox Role ARN
        run: |
          role_arn="arn:aws:iam::${PROD_AWS_ACCOUNT_ID}:role/${SANDBOX_CREATION_TRIGGER_ROLE}"
          echo "SANDBOX_CREATION_TRIGGER_ROLE_ARN=${role_arn}" >> "${GITHUB_ENV}"

      - name: Configure AWS Credentials (Sandbox Creation Trigger Role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.SANDBOX_CREATION_TRIGGER_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Start Pipeline Execution
        run: |
          aws codepipeline start-pipeline-execution --name "sandbox-crm-creation" \
            --variables \
            "name=BRANCH_NAME,value=${BRANCH_NAME}" \
            "name=PR_NUMBER,value=${PR_NUMBER}" \
            "name=IS_PULL_REQUEST,value=1"
