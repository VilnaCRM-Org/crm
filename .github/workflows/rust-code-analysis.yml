name: rust-code-analysis

on:
  pull_request:
    branches: ['main']

permissions: {}

jobs:
  rust-code-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Read RCA version from Makefile
        id: read_rca_version
        run: |
          rca_version="$(awk -F'= ' '/^RCA_VERSION[[:space:]]*=/{print $2; exit}' Makefile)"
          echo "rca_version=$rca_version" >> "$GITHUB_OUTPUT"

      - name: Cache rust-code-analysis binary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ./bin/rust-code-analysis-cli
          key: rca-${{ steps.read_rca_version.outputs.rca_version }}-linux-x86_64

      - name: Run lint-metrics
        run: make lint-metrics
