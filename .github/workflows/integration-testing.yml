name: integration testing
on:
  pull_request:
    branches:
      - main
jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Detect package manager
        id: pkg-manager
        run: |
          pm=$(node -p "require('./package.json').packageManager || ''")
          echo "value=$pm" >> "$GITHUB_OUTPUT"
          if [[ "$pm" == bun@* ]]; then
            echo "bun_version=${pm#bun@}" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable repo package manager
        if: ${{ !startsWith(steps.pkg-manager.outputs.value, 'bun') }}
        run: |
          corepack enable
          corepack prepare $(node -p "require('./package.json').packageManager") --activate

      - name: Configure package manager cache path
        if: ${{ !startsWith(steps.pkg-manager.outputs.value, 'bun') }}
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Cache dependencies
        id: cache-dependencies
        if: ${{ !startsWith(steps.pkg-manager.outputs.value, 'bun') }}
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-dependencies-node-${{ vars.NODE_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-dependencies-node-${{ vars.NODE_VERSION }}-

      - name: Install Bun
        if: ${{ startsWith(steps.pkg-manager.outputs.value, 'bun') }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.pkg-manager.outputs.bun_version || 'latest' }}

      - name: Start container
        env:
          CI: 0
        run: make start

      - name: Install dependencies
        env:
          CI: 0
        run: make install

      - name: Run integration tests
        env:
          CI: 0
        run: make test-integration
