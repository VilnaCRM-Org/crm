name: static testing

on:
  pull_request:
    branches: ['main']

jobs:
  static:
    runs-on: ubuntu-latest
    env:
      CI: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Detect package manager
        id: pkg-manager
        run: |
          pm=$(node -p "require('./package.json').packageManager || ''")
          echo "value=$pm" >> "$GITHUB_OUTPUT"
          if [[ "$pm" == bun@* ]]; then
            echo "bun_version=${pm#bun@}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache dependencies
        id: cache-dependencies
        if: ${{ !startsWith(steps.pkg-manager.outputs.value, 'bun') }}
        uses: actions/cache@v4.2.3
        with:
          path: node_modules
          key: ${{ runner.os }}-dependencies-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-dependencies-

      - name: Start container
        env:
          CI: 0
        run: make start

      - name: Install dependencies
        env:
          CI: 0
        run: make install

      - name: Run all linters
        env:
          CI: 0
        run: make lint
